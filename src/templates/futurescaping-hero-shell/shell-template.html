<section class="fs-shell" data-fs-shell>
  <div class="fs-shell__stage">
    <img class="fs-shell__image" alt="" data-fs-hero-image>
    <div class="fs-shell__glow" aria-hidden="true"></div>

    <div class="fs-shell__copy">
      <div class="fs-shell__brand">
        <div class="fs-shell__mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="fs-shell__brandword">
          <p class="fs-shell__brandname" data-fs-brand-name></p>
          <p class="fs-shell__brandsub" data-fs-brand-sub></p>
        </div>
      </div>
      <p class="fs-shell__eyebrow" data-fs-eyebrow></p>
      <h1 class="fs-shell__title" data-fs-title></h1>
      <p class="fs-shell__summary" data-fs-summary></p>
    </div>

    <div class="fs-shell__nav" data-fs-nav></div>

    <div class="fs-shell__pills" data-fs-pills></div>

    <div class="fs-shell__summary-dock is-hidden" data-fs-summary-dock></div>
  </div>
</section>
